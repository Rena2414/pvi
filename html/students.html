<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>


    <!-- Upper Panel -->
    <div class="header">
        <div class="hamburger-menu" onclick="toggleSidePanel()">☰</div>

        <a href="students.html" class="logo">CMS</a>

        <div class="user-info">
            <div class="notifications">

                <span class="bell-icon">🔔</span>

                    <div class="dropdown">
                        <div class="message">
                            <div class="avatar"></div>
                                <div class="message-content">
                                    <span class="user-name">User 1</span>
                                        <p class="message-text">Message 1</p>
                                </div>
                            </div>
                        <div class="message">
                            <div class="avatar"></div>
                                <div class="message-content">
                                    <span class="user-name">User 2</span>
                                        <p class="message-text">Message 2</p>
                                </div>
                            </div>
                            <div class="message">
                                <div class="avatar"></div>
                                    <div class="message-content">
                                        <span class="user-name">User 3</span>
                                            <p class="message-text">Message 3</p>
                                    </div>
                                </div>
                            </div>
                        </div>
            <div class="profile">

                <span class="avatar"></span> Stud Ent

                <div class="dropdown">
                    <div>Profile</div>
                    <div>Log Out</div>
                </div>
            </div>
        </div>
    </div> 





    <!-- Left Side Panel -->
    <div class="side-panel">
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><b>Students</b></li>
            <li><a href="tasks.html">Tasks</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <h1>Students</h1>
        <!-- Plus Button inside the table container -->
        <button class="plus-button" onclick="openModal()">+</button>
        <div class="table-container">
            <!-- Table of Students -->
            <table>
                <thead>
                    <tr>
                        <th><input type="checkbox"></th>
                        <th>Group</th>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>Birthday</th>
                        <th>Status</th>
                        <th>Options</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Example student row -->
                    <tr>
                        <td><input type="checkbox"></td>
                        <td>Group A</td>
                        <td>John Doe</td>
                        <td>Male</td>
                        <td>01/01/2000</td>
                        <td><span class="status-circle green-status"></span></td>
                        <td>
                            <button class="edit-btn">Edit</button>
                            <button class="delete-btn">Delete</button
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>
        <!-- Pagination -->
        <div class="pagination">
            <button>←</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>→</button>
        </div>
    </div>

   <!-- Modal Window -->
   <div class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add Student</h2>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
            <div>
                <label for="group">Group</label>
                <select id="group" name="group">
                    <option value="groupA">Group A</option>
                    <option value="groupB">Group B</option>
                </select>
            </div>
            <div>
                <label for="first-name">First Name</label>
                <input type="text" id="first-name" name="first-name">
            </div>
            <div>
                <label for="last-name">Last Name</label>
                <input type="text" id="last-name" name="last-name">
            </div>
            <div>
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>
            <div>
                <label for="birthday">Birthday</label>
                <input type="date" id="birthday" name="birthday">
            </div>
        </div>
        <div class="modal-footer">
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            <button class="create-btn">Create</button>
        </div>
    </div>
</div>
<script src="scripts.js"></script>    
</body>
</html>
